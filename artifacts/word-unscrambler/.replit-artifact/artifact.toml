kind = "web"
previewPath = "/"
title = "Word Unscrambler"
version = "1.0.0"
id = "artifacts/word-unscrambler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20902

[services.development]
run = "pnpm --filter @workspace/word-unscrambler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/word-unscrambler", "run", "build" ]
publicDir = "artifacts/word-unscrambler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20902"
BASE_PATH = "/"
